version: '3.8'

services:
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: yolo_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    # Note: If you want to enable hot-reloading for local backend development, uncomment the volumes block below
    # volumes:
    #   - ./app:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yolo_frontend
    ports:
      # Exposes Nginx internal port 80 to your localhost:8080 (same as your vite dev server)
      - "8080:80"
    depends_on:
      - backend
